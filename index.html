<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balaio de Gato FC — Futebol de Campo</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F5C518">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Balaio FC">
  <link rel="icon" type="image/svg+xml" href="/escudo.svg">
  <link rel="apple-touch-icon" href="/icon-512.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Acessibilidade: aplica tamanho/contraste salvos ANTES de renderizar (sem piscar)
    (function () {
      try {
        var s = localStorage.getItem('bgfc_a11y_scale');
        if (s && s !== '1') document.documentElement.style.zoom = s;
        if (localStorage.getItem('bgfc_a11y_contrast') === '1') document.documentElement.classList.add('a11y-contrast');
      } catch (e) { }
    })();
  </script>
  <script>
    // Paleta da marca Balaio de Gato FC (preto + dourado + verde campo)
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: {
              DEFAULT: '#F5C518', 300: '#FBE08A', 400: '#F7D44C', 500: '#F5C518',
              600: '#E0AE00', 700: '#B88A00', 800: '#8A6700', 900: '#5C4500'
            },
            pitch: {
              DEFAULT: '#15803d', 300: '#86efac', 400: '#22c55e', 500: '#16a34a',
              600: '#15803d', 700: '#166534', 800: '#14532d', 900: '#052e16'
            },
          },
          fontFamily: {
            oswald: ['Oswald', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@500;700&display=swap"
    rel="stylesheet">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // 1. Forçar limpeza de caches antigos ANTES de registrar
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(
              keys.filter(k => k !== 'bgfc-v1').map(k => caches.delete(k))
            );
          }
          // 2. Registrar SW com updateViaCache: 'none' para nunca servir SW do cache HTTP
          const reg = await navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
          // 3. Forçar check de atualização
          reg.update();
          // 4. Se houver SW novo esperando, ativar imediatamente
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'activated') {
                  console.log('SW atualizado e ativado!');
                }
              });
            }
          });
        } catch (err) {
          console.log('SW Error', err);
        }
      });
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: #f5f5f5;
    }

    .font-oswald {
      font-family: 'Oswald', sans-serif;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root">
    <div id="initial-loader"
      style="position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <img src="/escudo.svg" alt="Balaio de Gato FC" width="96" height="96"
        style="width:96px;height:96px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 0 24px rgba(245,197,24,.35))"
        onerror="this.style.display='none'" />
      <div
        style="width:64px;height:64px;border:4px solid #F5C518;border-top-color:transparent;border-radius:50%;animation:fdp-spin 1s linear infinite;margin-bottom:16px">
      </div>
      <p
        style="color:#F5C518;font-family:Oswald,sans-serif;text-transform:uppercase;font-style:italic;letter-spacing:0.4em;font-size:14px">
        Balaio de Gato FC</p>
    </div>
    <style>
      @keyframes fdp-spin {
        to {
          transform: rotate(360deg)
        }
      }
    </style>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
